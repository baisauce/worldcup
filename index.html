<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026美加墨世界杯 - 模拟盘投注</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="auth-container" class="auth-box" style="display: none;">
        <h2>🏆 世界杯模拟盘 - 账户登录</h2>
        <div class="input-group">
            <input type="text" id="auth-username" placeholder="请输入账号名称">
            <input type="password" id="auth-password" placeholder="请输入密码">
        </div>
        <div class="auth-btns">
            <button onclick="handleAuth('login')">立即登录</button>
            <button onclick="handleAuth('register')" class="btn-secondary">创建新账号</button>
        </div>
    </div>

    <div id="main-app" class="container" style="display: none;">
        <header>
            <h1>🏆 2026世界杯模拟投注</h1>
            <div class="user-info">
                <span id="current-user-name" style="margin-right:15px; font-weight:bold;">👤 未登录</span>
                <div class="wallet-box">
                    <span>我的资产：</span>
                    <strong id="balance">0</strong> <span class="coin">🪙 模拟币</span>
                </div>
                <button onclick="handleLogout()" class="logout-btn">退出</button>
            </div>
        </header>

        <main class="main-content">
            <section class="match-section">
                <h2>📅 赛事进程</h2>
                <div id="matches-container">
                    <p class="loading">正在努力加载世界杯赛程...</p>
                </div>
            </section>

            <section class="history-section">
                <h2>📝 我的投注记录 (自动结算)</h2>
                <div id="history-container">
                    <p class="empty-tip">暂无投注记录，快去预测比赛吧！</p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
