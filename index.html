<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026美加墨世界杯 - 模拟盘投注</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏆 2026美加墨世界杯模拟投注</h1>
            <div class="wallet-box">
                <span>我的资产：</span>
                <strong id="balance">1000</strong> <span class="coin">🪙 模拟币</span>
            </div>
        </header>

        <main class="main-content">
            <!-- 左侧：赛程与投注区 -->
            <section class="match-section">
                <h2>📅 今日赛程</h2>
                <div id="matches-container">
                    <p class="loading">正在努力加载世界杯赛程...</p>
                </div>
            </section>

            <!-- 右侧：我的投注单记录 -->
            <section class="history-section">
                <h2>📝 我的投注记录</h2>
                <div id="history-container">
                    <p class="empty-tip">暂无投注记录，快去预测比赛吧！</p>
                </div>
            </section>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
